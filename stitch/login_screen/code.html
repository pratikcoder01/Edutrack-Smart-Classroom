<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduTrack - Smart AI Attendance Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .input-focus-glow:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .soft-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }
        .floating-shape {
            filter: blur(80px);
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<!-- Floating Background Elements -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary/10 rounded-full floating-shape"></div>
<div class="absolute top-[60%] -right-[5%] w-[35%] h-[35%] bg-primary/5 rounded-full floating-shape"></div>
<div class="absolute -bottom-[10%] left-[20%] w-[25%] h-[25%] bg-blue-400/10 rounded-full floating-shape"></div>
</div>
<div class="relative z-10 flex min-h-screen w-full items-center justify-center p-4">
<div class="w-full max-w-[440px]">
<!-- Logo Section -->
<div class="mb-10 flex flex-col items-center text-center">
<div class="mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-primary text-white shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">EduTrack</h1>
<p class="mt-2 text-sm font-medium text-slate-500 dark:text-slate-400">Smart Classroom AI Attendance System</p>
</div>
<!-- Login Card -->
<div class="rounded-2xl bg-white dark:bg-slate-900 p-8 soft-shadow border border-slate-200/60 dark:border-slate-800">
<div class="mb-8">
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Welcome back</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Please enter your details to sign in</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email address</label>
<div class="relative">
<div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="input-focus-glow block w-full rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50 py-3 pl-10 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-0 transition-all duration-200" id="email" placeholder="name@institution.edu" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline underline-offset-4" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-slate-400 text-xl">lock</span>
</div>
<input class="input-focus-glow block w-full rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50 py-3 pl-10 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-0 transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary/20 cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-slate-600 dark:text-slate-400 cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Login Button -->
<button class="group relative flex w-full items-center justify-center rounded-xl bg-primary px-4 py-3.5 text-sm font-bold text-white shadow-lg shadow-primary/25 hover:bg-primary/90 hover:-translate-y-0.5 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
<span>Sign in to dashboard</span>
<span class="material-symbols-outlined ml-2 text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 border-t border-slate-100 dark:border-slate-800 pt-6">
<p class="text-center text-sm text-slate-500 dark:text-slate-400">
                        Don't have an account? 
                        <a class="font-bold text-primary hover:underline underline-offset-4" href="#">Contact admin</a>
</p>
</div>
</div>
<!-- Bottom Badges -->
<div class="mt-10 flex flex-wrap items-center justify-center gap-6 opacity-60">
<div class="flex items-center gap-2 grayscale hover:grayscale-0 transition-all">
<div class="h-6 w-6 rounded bg-slate-200 flex items-center justify-center">
<span class="material-symbols-outlined text-xs">verified_user</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-600 dark:text-slate-300">FERPA Compliant</span>
</div>
<div class="flex items-center gap-2 grayscale hover:grayscale-0 transition-all">
<div class="h-6 w-6 rounded bg-slate-200 flex items-center justify-center">
<span class="material-symbols-outlined text-xs">security</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-600 dark:text-slate-300">256-bit Encryption</span>
</div>
</div>
</div>
</div>
</body></html>
