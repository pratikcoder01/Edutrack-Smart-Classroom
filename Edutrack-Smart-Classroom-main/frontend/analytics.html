<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - EduTrack SaaS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden antialiased">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm relative z-20">
        <div class="h-16 flex items-center px-6 border-b border-slate-100 mb-4">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center mr-3 shadow-md">
                <i data-lucide="cpu" class="w-4 h-4 text-white"></i>
            </div>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-700">EduTrack</span>
        </div>
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-lg group transition-colors font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Dashboard
            </a>
            <a href="scanner.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-lg group transition-colors font-medium">
                <i data-lucide="scan-line" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Live Scanner
            </a>
            <a href="students.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-lg group transition-colors font-medium">
                <i data-lucide="users" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Students
            </a>
            <a href="records.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-lg group transition-colors font-medium">
                <i data-lucide="clipboard-list" class="w-5 h-5 mr-3 text-slate-400 group-hover:text-slate-600"></i>
                Attendance Records
            </a>
            <a href="analytics.html" class="flex items-center px-3 py-2.5 bg-blue-50 text-blue-700 rounded-lg group transition-colors font-medium">
                <i data-lucide="bar-chart-3" class="w-5 h-5 mr-3 text-blue-600 border border-blue-200 rounded p-0.5 bg-blue-100"></i>
                Full Analytics
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-slate-50/50">
        
        <header class="h-16 glass-nav flex items-center justify-between px-8 z-10 shadow-sm relative">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Performance Analytics</h1>
            
            <!-- Date Filter Placeholder -->
            <div class="flex items-center space-x-2">
                <select class="pl-4 pr-10 py-2 border border-slate-200 rounded-lg text-sm bg-white text-slate-700 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                    <option>This Semester</option>
                    <option>Last 30 Days</option>
                    <option>Year to Date</option>
                </select>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-8 relative z-0">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8 animate-slide-up">
                
                <!-- Chart 1: Subject Attendance Comparison (Radar) -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                    <h3 class="font-bold text-slate-800 mb-6 flex items-center">
                        <i data-lucide="layers" class="w-5 h-5 mr-2 text-indigo-500"></i>
                        Subject Participation (Averages)
                    </h3>
                    <div class="relative h-64 w-full">
                        <canvas id="subjectRadarChart"></canvas>
                    </div>
                </div>

                <!-- Chart 2: System Confidence Distribution (Doughnut) -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                    <h3 class="font-bold text-slate-800 mb-6 flex items-center">
                        <i data-lucide="target" class="w-5 h-5 mr-2 text-emerald-500"></i>
                        AI Confidence Distribution
                    </h3>
                    <div class="relative h-64 w-full flex justify-center">
                        <canvas id="confidenceDoughnut"></canvas>
                    </div>
                </div>
            </div>

            <!-- Full Width Chart: 30-Day Trend (Line) -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 animate-slide-up-delayed">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-slate-800 flex items-center">
                        <i data-lucide="activity" class="w-5 h-5 mr-2 text-blue-500"></i>
                        30-Day Class Attendance Engagement
                    </h3>
                    <button class="text-xs font-semibold text-slate-500 hover:text-blue-600 transition flex border border-slate-200 rounded p-1">
                        <i data-lucide="more-horizontal" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="relative h-80 w-full">
                    <canvas id="trendLineChart"></canvas>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        // Initialize All Charts on Load
        document.addEventListener('DOMContentLoaded', () => {
            renderRadarChart();
            renderDoughnutChart();
            renderLineChart();
        });

        // 1. Radar Chart Setup
        function renderRadarChart() {
            const ctx = document.getElementById('subjectRadarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Artificial Intelligence', 'Data Structures', 'Cloud Computing', 'Cybersecurity', 'Web Dev'],
                    datasets: [
                        {
                            label: 'Current Semester',
                            data: [88, 92, 75, 85, 95],
                            backgroundColor: 'rgba(59, 130, 246, 0.2)', // Blue
                            borderColor: 'rgba(59, 130, 246, 1)',
                            pointBackgroundColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 2,
                        },
                        {
                            label: 'Previous Semester',
                            data: [80, 85, 80, 70, 88],
                            backgroundColor: 'rgba(203, 213, 225, 0.2)', // Slate
                            borderColor: 'rgba(148, 163, 184, 1)',
                            pointBackgroundColor: 'rgba(148, 163, 184, 1)',
                            borderWidth: 2,
                            borderDash: [5, 5]
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { r: { angleLines: { color: '#f1f5f9' }, grid: { color: '#f1f5f9' }, pointLabels: { font: { family: "'Inter', sans-serif", size: 11 }, color: '#64748b' }}},
                    plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 6, font: { family: "'Inter', sans-serif" }}}}
                }
            });
        }

        // 2. Doughnut Chart Setup
        function renderDoughnutChart() {
            const ctx = document.getElementById('confidenceDoughnut').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['High (>95%)', 'Medium (85-94%)', 'Low Warning (<85%)'],
                    datasets: [{
                        data: [75, 20, 5],
                        backgroundColor: [
                            '#10b981', // Emerald
                            '#f59e0b', // Amber
                            '#ef4444'  // Rose
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8, font: { family: "'Inter', sans-serif" }}},
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', titleFont: { family: "'Inter', sans-serif" }, cornerRadius: 8 }
                    }
                }
            });
        }

        // 3. Line Chart Setup (Gradient under line)
        function renderLineChart() {
            const ctx = document.getElementById('trendLineChart').getContext('2d');
            
            let gradientBlue = ctx.createLinearGradient(0, 0, 0, 400);
            gradientBlue.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
            gradientBlue.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            // Mock Data for 30 Days
            const labels = Array.from({length: 30}, (_, i) => `Day ${i+1}`);
            // Generate some random realistic wave data between 35 and 45
            const dataPts = labels.map(() => Math.floor(Math.random() * (45 - 35 + 1)) + 35);
            // Drop a weekend
            dataPts[6] = 0; dataPts[7] = 0; dataPts[13] = 0; dataPts[14] = 0;

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Daily Attendance',
                        data: dataPts,
                        fill: true,
                        backgroundColor: gradientBlue,
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        tension: 0.4, // Smooth curve
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#3b82f6',
                        pointBorderWidth: 2,
                        pointRadius: 3,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', intersect: false, mode: 'index' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 50,
                            grid: { color: '#f1f5f9', drawBorder: false },
                            ticks: { font: { family: "'Inter', sans-serif" }, color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { maxTicksLimit: 10, font: { family: "'Inter', sans-serif" }, color: '#64748b' }
                        }
                    },
                    interaction: { mode: 'nearest', axis: 'x', intersect: false }
                }
            });
        }
    </script>
</body>
</html>
