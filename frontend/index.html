<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduTrack Smart Classroom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        /* Specific Styles for Login Page */
        body {
            /* Animated gradient background */
            background: linear-gradient(-45deg, #eff6ff, #dbeafe, #bfdbfe, #f0fdf4);
            background-size: 400% 400%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            /* Using the glassmorphism class from style.css */
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--primary-gradient);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);
            font-weight: bold;
            font-size: 24px;
        }

        .login-header h1 {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            font-size: 1rem;
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--primary-color);
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .forgot-password:hover {
            color: var(--primary-hover);
        }
        
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(40px);
        }
        
        .shape-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            background: rgba(59, 130, 246, 0.3);
        }
        
        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            right: -100px;
            background: rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="animate-bg-pan">

    <div class="floating-shapes">
        <div class="shape shape-1 animate-float"></div>
        <div class="shape shape-2 animate-float" style="animation-duration: 8s; animation-delay: 1s;"></div>
    </div>

    <div class="login-container glass-card animate-slide-up">
        <div class="login-header">
            <div class="login-logo animate-float" style="animation-duration: 4s; background: transparent; box-shadow: none;">
                <img src="images/logo.jpeg" alt="EduTrack Logo" style="width: 100%; height: 100%; border-radius: 16px; object-fit: cover;">
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to EduTrack Dashboard</p>
        </div>

        <!-- Since this is a static frontend, action goes directly to dashboard.html -->
        <form action="dashboard.html" method="GET">
            <div class="form-group animate-slide-up-delayed">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="admin@edutrack.edu" required>
            </div>

            <div class="form-group animate-slide-up-delayed-2">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary login-btn animate-slide-up-delayed-2">
                Sign In
            </button>
        </form>

        <a href="#" class="forgot-password animate-fade-in" style="animation-delay: 0.8s;">Forgot your password?</a>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
