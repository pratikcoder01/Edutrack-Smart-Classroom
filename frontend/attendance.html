<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - EduTrack Smart Classroom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .scanner-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        
        @media (min-width: 1025px) {
            .scanner-container {
                grid-template-columns: 1fr 350px;
                gap: 24px;
            }
        }

        .camera-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            background: #0f172a;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .camera-placeholder {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .camera-placeholder .icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }

        .scanning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .scanning-line {
            width: 100%;
            height: 2px;
            background: var(--success);
            box-shadow: 0 0 10px var(--success), 0 0 20px var(--success);
            position: absolute;
            top: 0;
            animation: scanLine 3s linear infinite;
        }

        @keyframes scanLine {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .attendance-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .student-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--surface-color);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }

        .student-row:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }


    </style>
</head>
<body>

    <div class="dashboard-layout">
        <!-- Sidebar Navigation (Same as dashboard) -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo" style="background: transparent; box-shadow: none;">
                    <img src="images/logo.jpeg" alt="EduTrack Logo" style="width: 100%; height: 100%; border-radius: 10px; object-fit: cover;">
                </div>
                <h2>EduTrack</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item active">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                    <span>Attendance</span>
                </a>
                <a href="students.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span>Students</span>
                </a>
                <a href="analytics.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    <span>Analytics</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span>Reports</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()"><svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                </div>
                <!-- Navbar right icons omitted for brevity -->
            </header>

            <div class="content-wrapper">
                <div class="page-header animate-slide-up">
                    <div>
                        <h1 class="text-h2">Attendance Scanner</h1>
                        <p class="text-muted">CS-101 Data Structures | Oct 24, 2024</p>
                    </div>
                    <div>
                        <button class="btn btn-primary" id="startBtn">
                            Start Camera
                        </button>
                    </div>
                </div>

                <div class="scanner-container animate-slide-up-delayed">
                    <div class="card p-0" style="padding: 0;">
                        <div class="camera-card" id="cameraView">
                            <div class="camera-placeholder">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                                <h3>Camera Offline</h3>
                                <p>Click Start Camera to begin scanning</p>
                            </div>
                            <div class="scanning-overlay" id="scanOverlay">
                                <div class="scanning-line"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="table-controls">
                            <h3 class="text-h4">Live Feed</h3>
                            <span class="badge badge-success" id="scanStatus">Ready</span>
                        </div>
                        
                        <div class="attendance-list staggered-list" id="studentList">
                            <div class="student-row">
                                <div class="student-info">
                                    <div class="user-avatar" style="width:32px; height:32px;">JD</div>
                                    <div>
                                        <div class="user-name">John Doe</div>
                                        <div class="user-role">Roll: 45</div>
                                    </div>
                                </div>
                                <span class="badge badge-success">Present</span>
                            </div>
                            <!-- More placeholder rows -->
                            <div class="student-row">
                                <div class="student-info">
                                    <div class="user-avatar" style="width:32px; height:32px;">AS</div>
                                    <div>
                                        <div class="user-name">Alice Smith</div>
                                        <div class="user-role">Roll: 12</div>
                                    </div>
                                </div>
                                <span class="badge badge-success">Present</span>
                            </div>
                            <div class="student-row">
                                <div class="student-info">
                                    <div class="user-avatar" style="width:32px; height:32px;">MJ</div>
                                    <div>
                                        <div class="user-name">Mark Johnson</div>
                                        <div class="user-role">Roll: 88</div>
                                    </div>
                                </div>
                                <span class="badge badge-danger">Absent</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Simple UI interaction logic for placeholder camera
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('startBtn');
            const placeholder = document.querySelector('.camera-placeholder');
            const overlay = document.getElementById('scanOverlay');
            const status = document.getElementById('scanStatus');
            const cameraView = document.getElementById('cameraView');
            let isScanning = false;

            btn.addEventListener('click', () => {
                isScanning = !isScanning;
                if (isScanning) {
                    btn.textContent = 'Stop Camera';
                    btn.classList.replace('btn-primary', 'btn-secondary');
                    placeholder.style.display = 'none';
                    overlay.style.display = 'block';
                    cameraView.style.background = '#1e293b'; // Simulate turning on screen
                    status.textContent = 'Scanning...';
                    status.classList.replace('badge-success', 'badge-warning');
                } else {
                    btn.textContent = 'Start Camera';
                    btn.classList.replace('btn-secondary', 'btn-primary');
                    placeholder.style.display = 'block';
                    overlay.style.display = 'none';
                    cameraView.style.background = '#0f172a';
                    status.textContent = 'Ready';
                    status.classList.replace('badge-warning', 'badge-success');
                }
            });
        });
    </script>
</body>
</html>
