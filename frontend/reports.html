<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - EduTrack Smart Classroom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo" style="background: transparent; box-shadow: none;">
                    <img src="images/logo.jpeg" alt="EduTrack Logo" style="width: 100%; height: 100%; border-radius: 10px; object-fit: cover;">
                </div>
                <h2>EduTrack</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                    <span>Attendance</span>
                </a>
                <a href="students.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span>Students</span>
                </a>
                <a href="analytics.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    <span>Analytics</span>
                </a>
                <a href="reports.html" class="nav-item active">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span>Reports</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()"><svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header animate-slide-up">
                    <div>
                        <h1 class="text-h2">Generate Reports</h1>
                        <p class="text-muted">Export attendance data to PDF, Excel, or CSV.</p>
                    </div>
                </div>

                <div class="card animate-slide-up-delayed" style="max-width: 800px; margin: 0 auto;">
                    <form onsubmit="event.preventDefault(); alert('Report generated and downloaded successfully!');">
                        <div class="flex flex-col gap-6">
                            
                            <!-- Form row -->
                            <div class="flex-col gap-2">
                                <label class="form-label">Select Report Type</label>
                                <div class="filter-bar">
                                    <label class="btn btn-secondary active" style="flex:1; border-color: var(--primary-color); background: rgba(59, 130, 246, 0.05); color: var(--primary-color);">
                                        <input type="radio" name="report_type" checked style="display:none;">
                                        Monthly Summary
                                    </label>
                                    <label class="btn btn-secondary" style="flex:1;">
                                        <input type="radio" name="report_type" style="display:none;">
                                        Weekly Detail
                                    </label>
                                    <label class="btn btn-secondary" style="flex:1;">
                                        <input type="radio" name="report_type" style="display:none;">
                                        Student Specific
                                    </label>
                                </div>
                            </div>
                            
                            <!-- Form row -->
                            <div class="flex gap-4" style="flex-wrap: wrap;">
                                <div class="flex-col gap-2" style="flex: 1; min-width: 200px;">
                                    <label class="form-label">Course / Class</label>
                                    <select class="form-input">
                                        <option>All Courses</option>
                                        <option>CS-101 Data Structures</option>
                                        <option>PHY-401 Quantum Physics</option>
                                    </select>
                                </div>
                                <div class="flex-col gap-2" style="flex: 1; min-width: 200px;">
                                    <label class="form-label">Format</label>
                                    <select class="form-input">
                                        <option>PDF Document (.pdf)</option>
                                        <option>Excel Spreadsheet (.xlsx)</option>
                                        <option>CSV File (.csv)</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary" style="margin-top: 16px; width: 100%;">
                                <svg class="icon" viewBox="0 0 24 24" style="margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Generate & Download Report
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Simple logic for radio button group styling
        document.querySelectorAll('.filter-bar .btn-secondary').forEach(label => {
            label.addEventListener('click', function() {
                document.querySelectorAll('.filter-bar .btn-secondary').forEach(l => {
                    l.style.borderColor = 'var(--border-color)';
                    l.style.background = 'var(--surface-color)';
                    l.style.color = 'var(--text-main)';
                });
                this.style.borderColor = 'var(--primary-color)';
                this.style.background = 'rgba(59, 130, 246, 0.05)';
                this.style.color = 'var(--primary-color)';
            });
        });
    </script>
</body>
</html>
